name: Run tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '.vscode/**'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Setup
    runs-on: ubuntu-latest
    env: 
      cache-name-composer: cache-composer-modules
      cache-name-assets: cache-symfony-assets
      APP_ID: kantine
      APP_ENV: test
      APP_DEBUG: 1
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, redis, pdo_sqlite, sodium
          tools: composer, symfony


      - name: Cache composer packages
        uses: actions/cache@v4
        id: cache_composer
          
        with:
          path: vendor
          key: ${{ runner.os }}-build-${{ env.cache-name-composer }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name-composer }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      
      - name: Cache symfony assets
        uses: actions/cache@v4
        id: cache_assets
          
        with:
          path: | 
            public/assets
            public/bundles
          key: ${{ runner.os }}-build-${{ env.cache-name-assets }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name-assets }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: setup tests
        run: |
          mkdir apps/zeiterfassung/templates
          composer install
          php bin/console secrets:generate-keys
          php bin/console secrets:set APP_SECRET --random
          php bin/console secrets:set JWT_PASSPHRASE --random
          php bin/console lexik:jwt:generate-keypair
          
          php bin/console importmap:install
          php bin/console doctrine:schema:update --force
          php bin/console doctrine:fixtures:load --quiet

      - name: run tests
        run: php bin/phpunit --display-deprecations

