controllers:
    resource:
        path: ../src/Controller/
        namespace: Zeiterfassung\Controller
    type: attribute

admin_area:
    resource: "@SonataAdminBundle/Resources/config/routing/sonata_admin.php"
    prefix: /admin

sonata_user_admin_security:
    resource: '@SonataUserBundle/Resources/config/routing/admin_security.php'
    prefix: /admin

sonata_user_admin_resetting:
    resource: '@SonataUserBundle/Resources/config/routing/admin_resetting.php'
    prefix: /admin/resetting

_sonata_admin:
    resource: .
    type: sonata_admin
    prefix: /admin